name: lifecycle
description: Life Cycle - African Youth Talent & Achievement Platform
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  fl_chart: ^0.66.2
  percent_indicator: ^4.2.3
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  flutter_animate: ^4.3.0
  lottie: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - favicon/app logo.png
    - tiers/diamond.png
    - tiers/platinum.png
    - tiers/gold.png
    - tiers/silver.png
    - tiers/Bronze.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: favicon/app logo.png
